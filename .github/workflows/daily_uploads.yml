name: Daily Uploads

on:
  schedule:
    # Runs at 02:30 UTC, which corresponds to 8:00 AM IST
    - cron: '30 2 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  run-uploads:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Change this if your scripts require a specific version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create credentials from secrets
      run: |
        echo "$ENV_FILE" > .env
        echo "$CLIENT_SECRET_JSON" > client_secret.json
        echo "$YOUTUBE_TOKEN_JSON" > youtube_token.json
      env:
        ENV_FILE: ${{ secrets.ENV_FILE }}
        CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
        YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}

    - name: Run Instagram Uploads
      run: python instagram_uploads.py

    - name: Run YouTube Uploads
      run: python youtube_uploads.py
